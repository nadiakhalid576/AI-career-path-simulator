services:
  - type: web
    name: career-path-backend
    runtime: python
    pythonVersion: 3.11.7
    buildCommand: cd career_path_backend && pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: >
      cd career_path_backend &&
      gunicorn career_path_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHONUNBUFFERED
        value: true
